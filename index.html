<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A fast, ad-free online calculator optimized for basic arithmetic operations; perform addition, subtraction, division, and multiplication instantly.">
    <title>Calculator</title>
    <link rel="icon" type="image/png" href="favicon.png.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <article class="main-container">
            <div class="main-cont2">
                <div class="screen">
                    <input id="input" type="text" readonly>
                </div>
                <div class="container">
                    <button data-type="clear" class="button1" type="button">AC</button>
                    <button data-type="operator" class="button1" type="button">%</button>
                    <button data-type="clear2" class="button1" type="button">&#9003;</button>
                    <button data-type="operator" class="signs" type="button">÷</button>
                    <button data-type="number" class="numbers" type="button">7</button>
                    <button data-type="number" class="numbers" type="button">8</button>
                    <button data-type="number" class="numbers" type="button">9</button>
                    <button data-type="operator" type="button" translate="no" class="signs">x</button>
                    <button data-type="number" class="numbers" type="button">4</button>
                    <button data-type="number" class="numbers" type="button">5</button>
                    <button data-type="number" class="numbers" type="button">6</button>
                    <button data-type="operator" class="signs" type="button">-</button>
                    <button data-type="number" class="numbers" type="button">1</button>
                    <button data-type="number" class="numbers" type="button">2</button>
                    <button data-type="number" class="numbers" type="button">3</button>
                    <button data-type="operator" class="signs" type="button">+</button>
                    <button data-type="number" class="numbers" type="button">0</button>
                    <button data-type="number" class="numbers" type="button">.</button>
                    <button data-type="equals" id="equals" class="signs" type="button">&equals;</button>
                </div>
            </div>
        </article>
    </main>

    <script src="script.js"></script>
</body>

</html>
